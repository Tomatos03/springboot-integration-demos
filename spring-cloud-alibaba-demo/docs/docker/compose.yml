services:
  mysql:
    image: ${MYSQL_IMAGE}
    container_name: ${MYSQL_CONTAINER}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../sql/seata.sql:/docker-entrypoint-initdb.d/02-seata.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: ${NACOS_IMAGE}
    container_name: ${NACOS_CONTAINER}
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: ${NACOS_AUTH_ENABLE}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
      TZ: ${TZ}
      JVM_XMS: ${NACOS_JVM_XMS}
      JVM_XMX: ${NACOS_JVM_XMX}
      JVM_XMN: ${NACOS_JVM_XMN}
    ports:
      - "${NACOS_PORT}:8848"
      - "${NACOS_GRPC_PORT}:9848"
      - "${NACOS_CONSOLE_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8848/nacos/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  sentinel-dashboard:
    image: ${SENTINEL_DASHBOARD_IMAGE}
    container_name: ${SENTINEL_DASHBOARD_CONTAINER}
    restart: unless-stopped
    ports:
      - "${SENTINEL_DASHBOARD_PORT}:8858"

  seata:
    image: ${SEATA_IMAGE}
    container_name: ${SEATA_CONTAINER}
    restart: unless-stopped
    environment:
      STORE_MODE: file
      SEATA_IP: ${SEATA_IP}
      SEATA_PORT: ${SEATA_PORT}
    ports:
      - "${SEATA_PORT}:8091"
    depends_on:
      mysql:
        condition: service_healthy

  skywalking-oap:
    image: ${SKYWALKING_OAP_IMAGE}
    container_name: ${SKYWALKING_OAP_CONTAINER}
    restart: unless-stopped
    ports:
      - "${SKYWALKING_OAP_GRPC_PORT}:11800"
      - "${SKYWALKING_OAP_HTTP_PORT}:12800"
    environment:
      SW_STORAGE: ${SKYWALKING_OAP_STORAGE}
      SW_JDBC_URL: ${SKYWALKING_OAP_JDBC_URL}
      SW_DATA_SOURCE_USER: ${SKYWALKING_OAP_JDBC_USER}
      SW_DATA_SOURCE_PASSWORD: ${SKYWALKING_OAP_JDBC_PASSWORD}
    volumes:
      - skywalking-h2-data:/data/skywalking

  skywalking-ui:
    image: ${SKYWALKING_UI_IMAGE}
    container_name: ${SKYWALKING_UI_CONTAINER}
    restart: unless-stopped
    ports:
      - "${SKYWALKING_UI_PORT}:8080"
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    depends_on:
      skywalking-oap:
        condition: service_started

volumes:
  mysql-data:
  skywalking-h2-data:
