<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .actor-box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .actor-label { font-size: 14px; font-weight: bold; text-anchor: middle; }
      .lifeline { stroke: #666666; stroke-dasharray: 5,5; }
      .message-arrow { stroke: #333333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .return-arrow { stroke: #999999; stroke-width: 1; stroke-dasharray: 3,3; fill: none; marker-end: url(#arrowhead-gray); }
      .message-label { font-size: 12px; fill: #333333; }
      .step-number { font-size: 11px; fill: #666666; font-weight: bold; }
      .alt-box { fill: none; stroke: #ff6600; stroke-width: 1; stroke-dasharray: 3,3; }
      .alt-label { font-size: 11px; fill: #ff6600; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333333" />
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999999" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="25" style="font-size: 18px; font-weight: bold; text-anchor: middle;">短信认证流程 - 宏观架构视图</text>

  <!-- Actor boxes -->
  <rect x="50" y="50" width="120" height="50" class="actor-box" rx="5"/>
  <text x="110" y="85" class="actor-label">用户 (客户端)</text>

  <rect x="250" y="50" width="120" height="50" class="actor-box" rx="5"/>
  <text x="310" y="85" class="actor-label">应用系统</text>

  <rect x="450" y="50" width="140" height="50" class="actor-box" rx="5"/>
  <text x="520" y="85" class="actor-label">短信服务商</text>

  <rect x="700" y="50" width="100" height="50" class="actor-box" rx="5"/>
  <text x="750" y="85" class="actor-label">数据库</text>

  <rect x="860" y="50" width="100" height="50" class="actor-box" rx="5"/>
  <text x="910" y="85" class="actor-label">Redis</text>

  <!-- Lifelines -->
  <line x1="110" y1="100" x2="110" y2="680" class="lifeline"/>
  <line x1="310" y1="100" x2="310" y2="680" class="lifeline"/>
  <line x1="520" y1="100" x2="520" y2="680" class="lifeline"/>
  <line x1="750" y1="100" x2="750" y2="680" class="lifeline"/>
  <line x1="910" y1="100" x2="910" y2="680" class="lifeline"/>

  <!-- Sequence: Step 1 - Request code -->
  <line x1="110" y1="140" x2="310" y2="160" class="message-arrow"/>
  <text x="200" y="135" class="message-label">1. 发送验证码请求 (phone)</text>
  <text x="320" y="155" class="step-number">①</text>

  <!-- Step 2 - Application sends SMS -->
  <line x1="310" y1="190" x2="520" y2="210" class="message-arrow"/>
  <text x="390" y="185" class="message-label">2. 调用短信服务商API</text>
  <text x="530" y="205" class="step-number">②</text>

  <!-- Step 3 - SMS Provider returns -->
  <line x1="520" y1="240" x2="310" y2="260" class="return-arrow"/>
  <text x="380" y="235" class="message-label">短信发送结果</text>

  <!-- Step 4 - Cache code in Redis -->
  <line x1="310" y1="290" x2="910" y2="310" class="message-arrow"/>
  <text x="580" y="285" class="message-label">3. 缓存验证码</text>
  <text x="920" y="305" class="step-number">③</text>

  <!-- Step 5 - Redis returns -->
  <line x1="910" y1="340" x2="310" y2="360" class="return-arrow"/>
  <text x="610" y="335" class="message-label">缓存成功</text>

  <!-- Step 6 - User receives SMS (no line, just note) -->
  <rect x="520" y="380" width="280" height="40" fill="#ffffcc" stroke="#ffcc00" stroke-width="1" rx="3"/>
  <text x="530" y="405" style="font-size: 11px; fill: #333333;">用户收到短信，获得验证码</text>

  <!-- Step 7 - Submit phone + code -->
  <line x1="110" y1="440" x2="310" y2="460" class="message-arrow"/>
  <text x="180" y="435" class="message-label">4. 提交手机号+验证码</text>
  <text x="320" y="455" class="step-number">④</text>

  <!-- Step 8 - Verify code in Redis -->
  <line x1="310" y1="490" x2="910" y2="510" class="message-arrow"/>
  <text x="580" y="485" class="message-label">5. 验证验证码</text>
  <text x="920" y="505" class="step-number">⑤</text>

  <!-- Step 9 - Redis returns verification result -->
  <line x1="910" y1="540" x2="310" y2="560" class="return-arrow"/>
  <text x="630" y="535" class="message-label">验证结果（匹配/不匹配）</text>

  <!-- Step 10 - Query user info from database -->
  <line x1="310" y1="590" x2="750" y2="610" class="message-arrow"/>
  <text x="480" y="585" class="message-label">6. 查询用户信息</text>
  <text x="760" y="605" class="step-number">⑥</text>

  <!-- Step 11 - Database returns user -->
  <line x1="750" y1="640" x2="310" y2="660" class="return-arrow"/>
  <text x="550" y="635" class="message-label">用户信息</text>

  <!-- Final return to user (JWT Token) -->
  <line x1="310" y1="680" x2="110" y2="700" class="return-arrow" stroke-dasharray="none" stroke="#00cc00" stroke-width="2"/>
  <text x="200" y="695" class="message-label" style="fill: #00cc00; font-weight: bold;">7. 签发 JWT Token</text>
  <text x="120" y="705" class="step-number">⑦</text>

  <!-- Legend -->
  <text x="50" y="725" style="font-size: 11px; fill: #666666;">图例：</text>
  <line x1="110" y1="730" x2="150" y2="730" class="message-arrow"/>
  <text x="160" y="733" style="font-size: 11px; fill: #666666;">请求/操作</text>
  
  <line x1="350" y1="730" x2="390" y2="730" class="return-arrow"/>
  <text x="400" y="733" style="font-size: 11px; fill: #666666;">响应/返回</text>
</svg>
