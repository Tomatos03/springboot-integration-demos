<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <linearGradient id="prodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="exchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="queueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="consGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">RabbitMQ 基本架构</text>

  <!-- Background regions -->
  <rect x="30" y="60" width="150" height="400" rx="12" fill="#E8F5E9" stroke="#C8E6C9" stroke-width="1"/>
  <text x="105" y="85" text-anchor="middle" font-size="12" fill="#2E7D32" font-weight="600">Producer</text>

  <rect x="230" y="60" width="200" height="400" rx="12" fill="#FFF3E0" stroke="#FFE0B2" stroke-width="1"/>
  <text x="330" y="85" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">Exchange</text>

  <rect x="490" y="60" width="170" height="400" rx="12" fill="#E3F2FD" stroke="#BBDEFB" stroke-width="1"/>
  <text x="575" y="85" text-anchor="middle" font-size="12" fill="#1565C0" font-weight="600">Queue</text>

  <rect x="720" y="60" width="150" height="400" rx="12" fill="#F3E5F5" stroke="#E1BEE7" stroke-width="1"/>
  <text x="795" y="85" text-anchor="middle" font-size="12" fill="#6A1B9A" font-weight="600">Consumer</text>

  <!-- ========== PRODUCERS ========== -->
  <!-- Producer 1 -->
  <rect x="50" y="120" width="110" height="50" rx="8" fill="url(#prodGrad)" filter="url(#shadow)"/>
  <text x="105" y="142" text-anchor="middle" font-size="13" fill="white" font-weight="600">Producer 1</text>
  <text x="105" y="158" text-anchor="middle" font-size="10" fill="#E8F5E9">RabbitTemplate</text>

  <!-- Producer 2 -->
  <rect x="50" y="200" width="110" height="50" rx="8" fill="url(#prodGrad)" filter="url(#shadow)"/>
  <text x="105" y="222" text-anchor="middle" font-size="13" fill="white" font-weight="600">Producer 2</text>
  <text x="105" y="238" text-anchor="middle" font-size="10" fill="#E8F5E9">RabbitTemplate</text>

  <!-- Producer N -->
  <rect x="50" y="280" width="110" height="50" rx="8" fill="url(#prodGrad)" filter="url(#shadow)"/>
  <text x="105" y="302" text-anchor="middle" font-size="13" fill="white" font-weight="600">Producer N</text>
  <text x="105" y="318" text-anchor="middle" font-size="10" fill="#E8F5E9">RabbitTemplate</text>

  <!-- Dots -->
  <circle cx="105" y="365" r="3" fill="#4CAF50"/>
  <circle cx="105" y="375" r="3" fill="#4CAF50"/>
  <circle cx="105" y="385" r="3" fill="#4CAF50"/>

  <!-- ========== EXCHANGES ========== -->
  <!-- Direct Exchange -->
  <rect x="250" y="110" width="160" height="55" rx="8" fill="url(#exchGrad)" filter="url(#shadow)"/>
  <text x="330" y="133" text-anchor="middle" font-size="13" fill="white" font-weight="600">Direct Exchange</text>
  <text x="330" y="150" text-anchor="middle" font-size="10" fill="#FFF3E0">精确匹配 routing key</text>

  <!-- Fanout Exchange -->
  <rect x="250" y="195" width="160" height="55" rx="8" fill="url(#exchGrad)" filter="url(#shadow)"/>
  <text x="330" y="218" text-anchor="middle" font-size="13" fill="white" font-weight="600">Fanout Exchange</text>
  <text x="330" y="235" text-anchor="middle" font-size="10" fill="#FFF3E0">广播到所有绑定队列</text>

  <!-- Topic Exchange -->
  <rect x="250" y="280" width="160" height="55" rx="8" fill="url(#exchGrad)" filter="url(#shadow)"/>
  <text x="330" y="303" text-anchor="middle" font-size="13" fill="white" font-weight="600">Topic Exchange</text>
  <text x="330" y="320" text-anchor="middle" font-size="10" fill="#FFF3E0">通配符匹配 *. #</text>

  <!-- Default Exchange -->
  <rect x="250" y="370" width="160" height="45" rx="8" fill="#FFB74D" filter="url(#shadow)"/>
  <text x="330" y="390" text-anchor="middle" font-size="12" fill="white" font-weight="600">Default Exchange</text>
  <text x="330" y="405" text-anchor="middle" font-size="9" fill="#FFF3E0">队列名作为路由键</text>

  <!-- ========== BINDINGS (arrows from exchange to queue) ========== -->
  <line x1="410" y1="137" x2="500" y2="137" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="455" y="128" text-anchor="middle" font-size="9" fill="#E65100">routingKey=blue</text>

  <line x1="410" y1="222" x2="500" y2="200" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <line x1="410" y1="222" x2="500" y2="260" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <line x1="410" y1="307" x2="500" y2="320" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="455" y="300" text-anchor="middle" font-size="9" fill="#E65100">china.#</text>

  <line x1="410" y1="392" x2="500" y2="392" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- ========== QUEUES ========== -->
  <!-- Queue 1 -->
  <rect x="505" y="115" width="140" height="45" rx="8" fill="url(#queueGrad)" filter="url(#shadow)"/>
  <text x="575" y="135" text-anchor="middle" font-size="12" fill="white" font-weight="600">Queue 1</text>
  <text x="575" y="150" text-anchor="middle" font-size="9" fill="#E3F2FD">direct.queue</text>

  <!-- Queue 2 -->
  <rect x="505" y="180" width="140" height="45" rx="8" fill="url(#queueGrad)" filter="url(#shadow)"/>
  <text x="575" y="200" text-anchor="middle" font-size="12" fill="white" font-weight="600">Queue 2</text>
  <text x="575" y="215" text-anchor="middle" font-size="9" fill="#E3F2FD">fanout.queue.1</text>

  <!-- Queue 3 -->
  <rect x="505" y="245" width="140" height="45" rx="8" fill="url(#queueGrad)" filter="url(#shadow)"/>
  <text x="575" y="265" text-anchor="middle" font-size="12" fill="white" font-weight="600">Queue 3</text>
  <text x="575" y="280" text-anchor="middle" font-size="9" fill="#E3F2FD">fanout.queue.2</text>

  <!-- Queue 4 -->
  <rect x="505" y="310" width="140" height="45" rx="8" fill="url(#queueGrad)" filter="url(#shadow)"/>
  <text x="575" y="330" text-anchor="middle" font-size="12" fill="white" font-weight="600">Queue 4</text>
  <text x="575" y="345" text-anchor="middle" font-size="9" fill="#E3F2FD">topic.queue</text>

  <!-- Queue 5 -->
  <rect x="505" y="375" width="140" height="45" rx="8" fill="url(#queueGrad)" filter="url(#shadow)"/>
  <text x="575" y="395" text-anchor="middle" font-size="12" fill="white" font-weight="600">Queue 5</text>
  <text x="575" y="410" text-anchor="middle" font-size="9" fill="#E3F2FD">default.queue</text>

  <!-- ========== CONSUMERS ========== -->
  <!-- Consumer 1 -->
  <rect x="735" y="120" width="120" height="50" rx="8" fill="url(#consGrad)" filter="url(#shadow)"/>
  <text x="795" y="142" text-anchor="middle" font-size="12" fill="white" font-weight="600">Consumer 1</text>
  <text x="795" y="158" text-anchor="middle" font-size="9" fill="#F3E5F5">@RabbitListener</text>

  <!-- Consumer 2 -->
  <rect x="735" y="205" width="120" height="50" rx="8" fill="url(#consGrad)" filter="url(#shadow)"/>
  <text x="795" y="227" text-anchor="middle" font-size="12" fill="white" font-weight="600">Consumer 2</text>
  <text x="795" y="243" text-anchor="middle" font-size="9" fill="#F3E5F5">@RabbitListener</text>

  <!-- Consumer 3 -->
  <rect x="735" y="290" width="120" height="50" rx="8" fill="url(#consGrad)" filter="url(#shadow)"/>
  <text x="795" y="312" text-anchor="middle" font-size="12" fill="white" font-weight="600">Consumer 3</text>
  <text x="795" y="328" text-anchor="middle" font-size="9" fill="#F3E5F5">@RabbitListener</text>

  <!-- Consumer N dots -->
  <circle cx="795" y="370" r="3" fill="#9C27B0"/>
  <circle cx="795" y="380" r="3" fill="#9C27B0"/>
  <circle cx="795" y="390" r="3" fill="#9C27B0"/>

  <!-- ========== FLOW ARROWS ========== -->
  <!-- Producer → Exchange -->
  <line x1="160" y1="145" x2="250" y2="137" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="160" y1="225" x2="250" y2="222" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="160" y1="305" x2="250" y2="307" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Queue → Consumer -->
  <line x1="645" y1="137" x2="735" y2="145" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="645" y1="202" x2="735" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="645" y1="267" x2="735" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="645" y1="332" x2="735" y2="315" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ========== LEGEND ========== -->
  <rect x="30" y="475" width="840" height="35" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="50" y1="492" x2="80" y2="492" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="90" y="496" font-size="11" fill="#555">消息流向</text>
  <line x1="180" y1="492" x2="210" y2="492" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="220" y="496" font-size="11" fill="#555">Binding（绑定路由）</text>
  <rect x="390" y="482" width="16" height="16" rx="3" fill="url(#prodGrad)"/>
  <text x="415" y="496" font-size="11" fill="#555">生产者</text>
  <rect x="470" y="482" width="16" height="16" rx="3" fill="url(#exchGrad)"/>
  <text x="495" y="496" font-size="11" fill="#555">交换机</text>
  <rect x="545" y="482" width="16" height="16" rx="3" fill="url(#queueGrad)"/>
  <text x="570" y="496" font-size="11" fill="#555">队列</text>
  <rect x="615" y="482" width="16" height="16" rx="3" fill="url(#consGrad)"/>
  <text x="640" y="496" font-size="11" fill="#555">消费者</text>
</svg>
